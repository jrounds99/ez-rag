<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>{{TITLE}}</h1>
      <div class="meta">
        <span id="status" class="dot"></span>
        <span id="status-text">connecting...</span>
        <button id="clear-btn" title="Clear conversation">Clear</button>
      </div>
    </header>

    <main id="messages" aria-live="polite"></main>

    <footer>
      <textarea id="input"
                placeholder="Ask something. Enter sends, Shift+Enter for newline."
                rows="2"></textarea>
      <button id="send" type="button">Send</button>
    </footer>

    <p class="footnote">
      Edit <code>chat.html</code>, <code>chat.css</code>, <code>chat.js</code>
      to customize. The bundled <code>data/config.toml</code> controls
      retrieval and the LLM.
    </p>
  </div>

  <!-- Source-preview modal — shown when a citation chip is clicked. -->
  <div id="source-modal" class="modal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-labelledby="source-title">
      <header class="modal-header">
        <div>
          <h2 id="source-title"></h2>
          <p id="source-path" class="muted"></p>
        </div>
        <button id="source-close" type="button" aria-label="Close">×</button>
      </header>
      <div id="source-body" class="modal-body"></div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
