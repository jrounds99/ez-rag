# ez-rag GUI themes
#
# Each top-level table is a named palette. Pick one in Settings → Appearance.
# To customize, copy a palette, rename it (alphanumeric, no spaces), tweak the
# colors, save, and pick it from the dropdown. Relaunch ez-rag to apply.
#
# Color keys:
#   accent          primary brand color (buttons, highlights)
#   accent_soft     secondary accent (hover/pressed states)
#   bg              window background
#   surface         card / panel background
#   surface_hi      raised surface (chips, hovered cards)
#   on_surface      primary text color
#   on_surface_dim  muted/secondary text
#   success         green-ish status (ingest done, hits)
#   warning         amber-ish status (slow, OCR fallback)
#   danger          red-ish status (errors, stalls)
#   user_bubble     chat bubble bg for the user's turn
#   assist_bubble   chat bubble bg for the assistant's turn
#   chip_bg         citation chips, file pills
#
# All values are CSS hex strings (#RRGGBB).

# ---------------------------------------------------------------------------
# Dark (default — indigo accent on near-black)
# ---------------------------------------------------------------------------
[dark]
accent          = "#7C7BFF"
accent_soft     = "#5856D6"
bg              = "#0F1115"
surface         = "#171922"
surface_hi      = "#1F2230"
on_surface      = "#E6E7EB"
on_surface_dim  = "#9097A6"
success         = "#3DDC84"
warning         = "#F6B042"
danger          = "#F75A68"
user_bubble     = "#272A39"
assist_bubble   = "#1A1D29"
chip_bg         = "#23263A"

